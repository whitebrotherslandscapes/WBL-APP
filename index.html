<style>
  :root {

    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;

    padding-bottom: env(safe-area-inset-bottom);
  }
  button { font-family: inherit; }

  .app {
    max-width: 520px;
    margin: 0 auto;
    padding: 12px 16px 40px;
    padding-top: calc(12px + env(safe-area-inset-top));
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 4px 22px;
  }
  .brand {
    display: flex;
    align-items: center;

    font-size: 15px;
    font-weight: 600;

  .brand-mark {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);

  }
  .icon-btn {
    width: 40px; height: 40px;
    border: none;
    background: transparent;
    border-radius: 10px;

    display: flex; align-items: center; justify-content: center;

  .back-bar {

  .back-btn {
    display: inline-flex; align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    color: var(--accent);

    cursor: pointer;
    padding: 8px 12px 8px 4px;
    margin-left: -4px;
  }

  .view-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 4px 4px 6px;

  }
  .view-subtitle {

  .section { margin-bottom: 28px; }
  .section-head {

  .section-label {

  .section-action {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 8px;

  .card {
    background: var(--surface);
    border: 1px solid var(--border);

  }
  .row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    color: var(--ink);

  .row-title { font-weight: 500; font-size: 16px; color: var(--ink); }
  .row-meta { font-size: 13px; color: var(--ink-faint); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .btn-primary:active { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border-strong);

  .btn-secondary:active { background: var(--border); }
  .btn-danger {

  .field { margin-bottom: 14px; }
  .field-label {

    font-size: 13px;

  .field input,

    border: 1px solid var(--border);
    border-radius: var(--radius);

  .field textarea { resize: vertical; min-height: 84px; line-height: 1.4; }

    top: 50%;

    margin-bottom: 2px;

  .selected-client-addr {

  .summary-card {

  .summary-row {

    font-size: 14px;

  }
  .summary-row.total {
    border-top: 1px solid var(--border);
    margin-top: 6px;
    padding-top: 12px;
    font-size: 16px;
    font-weight: 600;

  .summary-row .val { font-variant-numeric: tabular-nums; color: var(--ink); }
  .summary-row.total .val { font-size: 17px; }

  .empty {
    text-align: center;
    color: var(--ink-muted);
    font-size: 14px;
    padding: 28px 16px;

  .preview-eyebrow {

  .preview-dates {

  }
  .preview-dates .lbl { color: var(--ink-faint); margin-right: 6px; }
  .preview-divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }
  .preview-billto-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .preview-client-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
  .preview-client-addr { white-space: pre-line; color: var(--ink-muted); font-size: 12px; }
  .preview-table-head {
    display: flex; justify-content: space-between;
    font-size: 9px;
    text-transform: uppercase;

    margin-bottom: 8px;
  }
  .preview-line {
    display: flex; justify-content: space-between;
    align-items: start;
    gap: 14px;
    padding: 6px 0;
  }
  .preview-desc { color: var(--ink); flex: 1; }
  .preview-amount { font-variant-numeric: tabular-nums; font-weight: 500; }
  .preview-total {
    display: flex; justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--ink);
    font-weight: 700;

  }
  .preview-pay {
    margin-top: 20px;
    padding: 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: #FAFAF7;
  }
  .preview-pay-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;

  }
  .preview-pay-row {
    display: flex;

  }
  .preview-pay-row .k { color: var(--ink-muted); width: 90px; flex-shrink: 0; }
  .preview-pay-row .v { color: var(--ink); font-family: var(--font-mono); }

  .toast {
    position: fixed;
    bottom: calc(28px + env(safe-area-inset-bottom));

    border-radius: 999px;

    z-index: 100;
    animation: toast-in 0.2s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);

  @keyframes toast-in {

  .loader {

<body>
<div id="app" class="app"><div class="loader">Loading…</div></div>
<div id="toast-host"></div>

<script>
/* ============================================================
   WhiteBrothersLandscapes — Invoice Generator
   Self-contained. Uses localStorage. Works on any HTTPS host
   (GitHub Pages, Netlify, etc) and as a saved Home Screen app.
   ============================================================ */

const STORAGE = {
  company: 'wbl:company',
  clients: 'wbl:clients',
  invoices: 'wbl:invoices',
  counter: 'wbl:counter',
  seeded: 'wbl:seeded',
};

const DEFAULT_COMPANY = {
  name: 'WhiteBrothersLandscapes',
  email: 'whitebrotherslandscapes@gmail.com',
  phone: '07718370333',
  payableTo: 'J WHITE',
  sortCode: '20-26-82',
  account: '23715078',
};

// Pre-seeded clients (loaded on first launch only)
const SEED_CLIENTS = [
  {
    name: '1Force Fitness',
    address: 'Unit 11 Beach Close\nNewhaven\nBN9 0BY',
    email: '',
  },
  {
    name: 'Rachel Logan',
    address: '101 Denton Road\nNewhaven\nBN9 0QE',
    email: '',
  },
  {
    name: 'Mark Ayling',
    address: '59 Hurdis Rd\nBN25 2ST',
    email: 'mark.ayling1@btinternet.com',
  },
];

const state = {
  view: 'home',
  company: { ...DEFAULT_COMPANY },
  clients: {},
  invoices: {},
  counter: 1,
  draft: { clientId: null, amount: '', description: '' },
  view_invoice_number: null,
};

/* ---------- Storage (localStorage) ---------- */

function storageGet(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    try { return JSON.parse(raw); } catch { return raw; }
  } catch { return fallback; }
}
function storageSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { console.error('localStorage.setItem failed', key, e); toast('Could not save.'); return false; }
}
function storageDelete(key) {
  try { localStorage.removeItem(key); } catch {}
}

function loadAll() {
  const co = storageGet(STORAGE.company, null);
  if (!co) {
    state.company = { ...DEFAULT_COMPANY };
    storageSet(STORAGE.company, state.company);
  } else {
    state.company = { ...DEFAULT_COMPANY, ...co };
  }

  state.clients = storageGet(STORAGE.clients, {});
  state.invoices = storageGet(STORAGE.invoices, {});
  const ct = storageGet(STORAGE.counter, 1);
  state.counter = typeof ct === 'number' ? ct : 1;

  // Seed clients on first run
  const seeded = storageGet(STORAGE.seeded, false);
  if (!seeded && Object.keys(state.clients).length === 0) {
    for (const c of SEED_CLIENTS) {
      const id = uid();
      state.clients[id] = { id, name: c.name, address: c.address, email: c.email || '', createdAt: Date.now() };
    }
    storageSet(STORAGE.clients, state.clients);
    storageSet(STORAGE.seeded, true);
  }
}

/* ---------- Utilities ---------- */

function uid() { return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
function pad3(n) { return String(n).padStart(3, '0'); }
function nextInvoiceNumber() { return 'WBL-' + pad3(state.counter); }

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDaysISO(iso, days) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function formatDateShort(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function formatGBP(n) {
  const num = typeof n === 'string' ? parseFloat(n) : n;
  if (!isFinite(num)) return '£0.00';
  return num.toLocaleString('en-GB', { style: 'currency', currency: 'GBP' });
}
function escapeHTML(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- Icons ---------- */

const ICON = {
  chevron: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>',
  back: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>',
  gear: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  plus: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  arrow: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
};

/* ---------- Toast ---------- */

let toastTimer = null;
function toast(msg) {
  const host = document.getElementById('toast-host');
  host.innerHTML = `<div class="toast">${escapeHTML(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { host.innerHTML = ''; }, 2400);
}

/* ---------- Navigation ---------- */

function go(view, opts = {}) {
  state.view = view;
  if (opts.draft) state.draft = { ...state.draft, ...opts.draft };
  if (opts.viewInvoiceNumber !== undefined) state.view_invoice_number = opts.viewInvoiceNumber;
  if (opts.resetDraft) state.draft = { clientId: null, amount: '', description: '' };
  render();
}

/* ---------- Renderers ---------- */

function render() {
  const root = document.getElementById('app');
  let html = '';
  switch (state.view) {
    case 'home':         html = renderHome();         break;
    case 'newInvoice':   html = renderNewInvoice();   break;
    case 'pickClient':   html = renderPickClient();   break;
    case 'newClient':    html = renderNewClient();    break;
    case 'editClient':   html = renderEditClient();   break;
    case 'invoiceView':  html = renderInvoiceView();  break;
    case 'settings':     html = renderSettings();     break;
    default:             html = renderHome();
  }
  root.innerHTML = html;
  attachListeners();
  window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
}

/* ---------- Event wiring ---------- */

function attachListeners() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', onAction);
  });

  const invForm = document.getElementById('invoice-form');
  if (invForm) {
    const amt = document.getElementById('amt');
    const desc = document.getElementById('desc');
    const total = document.getElementById('summary-total');
    if (amt) amt.addEventListener('input', () => {
      state.draft.amount = amt.value;
      total.textContent = formatGBP(parseFloat(amt.value) || 0);
    });
    if (desc) desc.addEventListener('input', () => { state.draft.description = desc.value; });
    invForm.addEventListener('submit', onSubmitInvoice);
  }

  const cForm = document.getElementById('client-form');
  if (cForm) cForm.addEventListener('submit', onSubmitNewClient);

  const ceForm = document.getElementById('client-edit-form');
  if (ceForm) ceForm.addEventListener('submit', onSubmitEditClient);

  const sForm = document.getElementById('settings-form');
  if (sForm) sForm.addEventListener('submit', onSubmitSettings);
}

function onAction(e) {
  const t = e.currentTarget;
  const action = t.dataset.action;
  switch (action) {
    case 'home': go('home'); break;
    case 'settings': go('settings'); break;
    case 'new-invoice-pick':
      go('pickClient', { resetDraft: true });
      break;
    case 'pick-client': go('pickClient'); break;
    case 'add-client': go('newClient'); break;
    case 'back-from-new-client':
      if (state.draft.amount || state.draft.description || state.draft.clientId) go('newInvoice');
      else go('home');
      break;
    case 'new-for-client': {
      const id = t.dataset.id;
      state.draft.clientId = id;
      go('newInvoice');
      break;
    }
    case 'edit-client': {
      state.draft.editingClientId = t.dataset.id;
      go('editClient');
      break;
    }
    case 'delete-client': {
      const id = t.dataset.id;
      const c = state.clients[id];
      if (!c) return;
      if (!confirm(`Delete ${c.name}? Their saved address will be removed. Past invoices are kept.`)) return;
      delete state.clients[id];
      storageSet(STORAGE.clients, state.clients);
      if (state.draft.clientId === id) state.draft.clientId = null;
      toast('Client deleted');
      go('home');
      break;
    }
    case 'new-invoice': go('newInvoice'); break;
    case 'view-invoice': go('invoiceView', { viewInvoiceNumber: t.dataset.number }); break;
    case 'share-pdf':
      handleSharePDF(t.dataset.number);
      break;
    case 'download-pdf':
      handleDownloadPDF(t.dataset.number);
      break;
    case 'delete-invoice': {
      const num = t.dataset.number;
      if (!confirm(`Delete invoice ${num}? This cannot be undone.`)) return;
      delete state.invoices[num];
      storageSet(STORAGE.invoices, state.invoices);
      toast('Invoice deleted');
      go('home');
      break;
    }
    case 'reset-app': {
      if (!confirm('Clear ALL saved data — clients, invoices and settings? This cannot be undone.')) return;
      [STORAGE.company, STORAGE.clients, STORAGE.invoices, STORAGE.counter, STORAGE.seeded].forEach(storageDelete);
      state.company = { ...DEFAULT_COMPANY };
      state.clients = {};
      state.invoices = {};
      state.counter = 1;
      state.draft = { clientId: null, amount: '', description: '' };
      storageSet(STORAGE.company, state.company);
      toast('All data cleared');
      go('home');
      break;
    }
  }
}

function onSubmitNewClient(e) {
  e.preventDefault();
  const form = e.currentTarget;
  const name = form.name.value.trim();
  const address = form.address.value.trim();
  const email = form.email.value.trim();
  if (!name) { toast('Name required'); return; }
  const id = uid();
  state.clients[id] = { id, name, address, email, createdAt: Date.now() };
  storageSet(STORAGE.clients, state.clients);
  state.draft.clientId = id;
  toast('Client saved');
  go('newInvoice');
}

function onSubmitEditClient(e) {
  e.preventDefault();
  const form = e.currentTarget;
  const id = state.draft.editingClientId;
  const c = state.clients[id];
  if (!c) { go('home'); return; }
  c.name = form.name.value.trim();
  c.address = form.address.value.trim();
  c.email = form.email.value.trim();
  storageSet(STORAGE.clients, state.clients);
  toast('Client updated');
  go('newInvoice');
}

function onSubmitInvoice(e) {
  e.preventDefault();
  if (!state.draft.clientId) { toast('Choose a client first'); return; }
  const amount = parseFloat(state.draft.amount);
  if (!isFinite(amount) || amount <= 0) { toast('Enter an amount'); return; }
  const description = (state.draft.description || '').trim();
  if (!description) { toast('Add a job summary'); return; }

  const client = state.clients[state.draft.clientId];
  const number = nextInvoiceNumber();
  const dateIssued = todayISO();
  const dateDue = addDaysISO(dateIssued, 30);

  const inv = {
    number,
    clientId: client.id,
    clientName: client.name,
    clientAddress: client.address || '',
    clientEmail: client.email || '',
    amount,
    description,
    dateIssued,
    dateDue,
    createdAt: Date.now(),
  };

  state.invoices[number] = inv;
  state.counter += 1;
  storageSet(STORAGE.invoices, state.invoices);
  storageSet(STORAGE.counter, state.counter);

  state.draft = { clientId: null, amount: '', description: '' };
  go('invoiceView', { viewInvoiceNumber: number });
  toast('Invoice ready');
}

function onSubmitSettings(e) {
  e.preventDefault();
  const f = e.currentTarget;
  state.company = {
    name: f.name.value.trim() || DEFAULT_COMPANY.name,
    email: f.email.value.trim(),
    phone: f.phone.value.trim(),
    payableTo: f.payableTo.value.trim(),
    sortCode: f.sortCode.value.trim(),
    account: f.account.value.trim(),
  };
  storageSet(STORAGE.company, state.company);
  toast('Settings saved');
  go('home');
}

/* ---------- PDF generation ---------- */

function jspdfReady() {
  return typeof window.jspdf !== 'undefined' && typeof window.jspdf.jsPDF !== 'undefined';
}

async function waitForJsPDF(timeoutMs = 8000) {
  if (jspdfReady()) return true;
  const start = Date.now();
  return new Promise(resolve => {
    const tick = () => {
      if (jspdfReady()) return resolve(true);
      if (Date.now() - start > timeoutMs) return resolve(false);
      setTimeout(tick, 100);
    };
    tick();
  });
}

function generateInvoicePDF(inv) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const co = state.company;

  const M = 20;
  const W = 210 - M * 2;
  let y = M + 4;

  const INK = [26, 26, 26];
  const MUTED = [107, 107, 107];
  const FAINT = [154, 154, 149];
  const BORDER = [220, 218, 211];

  // Header
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(...INK);
  doc.text(co.name, M, y);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...FAINT);
  doc.text('INVOICE', 210 - M, y - 5, { align: 'right', charSpace: 0.8 });

  doc.setFont('courier', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(...INK);
  doc.text(inv.number, 210 - M, y, { align: 'right' });

  y += 6;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...MUTED);
  doc.text(co.email, M, y);
  y += 4;
  doc.text(co.phone, M, y);

  let yRight = y - 4;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...MUTED);
  doc.text('Issued', 210 - M - 32, yRight, { align: 'right' });
  doc.text('Due', 210 - M - 32, yRight + 5, { align: 'right' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...INK);
  doc.text(formatDate(inv.dateIssued), 210 - M, yRight, { align: 'right' });
  doc.text(formatDate(inv.dateDue), 210 - M, yRight + 5, { align: 'right' });

  y += 10;
  doc.setDrawColor(...BORDER);
  doc.setLineWidth(0.2);
  doc.line(M, y, 210 - M, y);

  // Bill to
  y += 9;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...FAINT);
  doc.text('BILL TO', M, y, { charSpace: 0.8 });

  y += 6;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(12);
  doc.setTextColor(...INK);
  doc.text(inv.clientName, M, y);

  if (inv.clientAddress) {
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(...MUTED);
    const lines = inv.clientAddress.split('\n').filter(l => l.trim());
    for (const line of lines) {
      y += 5;
      doc.text(line, M, y);
    }
  }

  y += 10;
  doc.setDrawColor(...BORDER);
  doc.line(M, y, 210 - M, y);

  // Line items
  y += 9;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...FAINT);
  doc.text('DESCRIPTION', M, y, { charSpace: 0.6 });
  doc.text('AMOUNT', 210 - M, y, { align: 'right', charSpace: 0.6 });

  y += 7;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.setTextColor(...INK);
  const descLines = doc.splitTextToSize(inv.description, W - 40);
  doc.text(descLines, M, y);
  doc.text(formatGBP(inv.amount), 210 - M, y, { align: 'right' });
  y += (descLines.length - 1) * 5;

  // Total
  y += 10;
  doc.setDrawColor(...INK);
  doc.setLineWidth(0.4);
  doc.line(M, y, 210 - M, y);
  y += 8;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(...INK);
  doc.text('Total', M, y);
  doc.text(formatGBP(inv.amount), 210 - M, y, { align: 'right' });

  // Payment details box
  y += 14;
  const boxH = 32;
  doc.setDrawColor(...BORDER);
  doc.setLineWidth(0.2);
  doc.setFillColor(250, 250, 247);
  doc.roundedRect(M, y, W, boxH, 2, 2, 'FD');

  let by = y + 7;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(...FAINT);
  doc.text('PAYMENT DETAILS', M + 5, by, { charSpace: 0.8 });

  by += 6;
  const lblX = M + 5;
  const valX = M + 33;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(...MUTED);
  doc.text('Payable to', lblX, by);
  doc.text('Sort code', lblX, by + 6);
  doc.text('Account', lblX, by + 12);

  doc.setFont('helvetica', 'bold');
  doc.setTextColor(...INK);
  doc.text(co.payableTo, valX, by);
  doc.setFont('courier', 'bold');
  doc.text(co.sortCode, valX, by + 6);
  doc.text(co.account, valX, by + 12);

  // Footer
  const footY = 297 - 16;
  doc.setDrawColor(...BORDER);
  doc.setLineWidth(0.2);
  doc.line(M, footY - 6, 210 - M, footY - 6);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...FAINT);
  doc.text(`${co.name}  ·  ${co.email}  ·  ${co.phone}`, 210 / 2, footY, { align: 'center' });

  return doc;
}

function pdfFilename(inv) {
  const safeName = inv.clientName.replace(/[^a-zA-Z0-9-_]+/g, '_').replace(/^_|_$/g, '');
  return `${inv.number}_${safeName}.pdf`;
}

async function handleSharePDF(number) {
  const inv = state.invoices[number];
  if (!inv) return;
  toast('Preparing PDF…');
  const ready = await waitForJsPDF();
  if (!ready) { toast('PDF library failed to load. Check connection and try again.'); return; }

  const doc = generateInvoicePDF(inv);
  const blob = doc.output('blob');
  const filename = pdfFilename(inv);
  const file = new File([blob], filename, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: filename });
      return;
    } catch (err) {
      if (err && err.name === 'AbortError') return;
    }
  }
  triggerDownload(blob, filename);
  toast('Sharing not available — opened the PDF instead');
}

async function handleDownloadPDF(number) {
  const inv = state.invoices[number];
  if (!inv) return;
  toast('Preparing PDF…');
  const ready = await waitForJsPDF();
  if (!ready) { toast('PDF library failed to load. Check connection and try again.'); return; }

  const doc = generateInvoicePDF(inv);
  const blob = doc.output('blob');
  const filename = pdfFilename(inv);
  triggerDownload(blob, filename);
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 60000);
}

/* ---------- Boot ---------- */

try {
  loadAll();
} catch (e) {
  console.error('Load failed', e);
}
render();
</script>
